name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --all-groups
        working-directory: backend
      - run: uv run ruff check app
        working-directory: backend
      - run: uv run mypy app
        working-directory: backend
      - run: uv run pytest
        working-directory: backend
      - run: uv run python ../scripts/check_env_sync.py
        working-directory: backend
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
  schema-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/remotion-templates/package-lock.json
      - run: uv sync --all-groups
        working-directory: backend
      - run: npm ci
        working-directory: packages/remotion-templates
      - run: sh scripts/check_scene_schema_sync.sh
